<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANYMOVIE PREMIUM</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; overflow: hidden; }
        #sidebar { width: 30%; height: 100vh; background: #111; overflow-y: auto; border-right: 2px solid #e50914; }
        #main-content { width: 70%; height: 100vh; }
        .movie-item { padding: 20px; border-bottom: 1px solid #222; cursor: pointer; background: #1a1a1a; margin: 5px; border-radius: 8px; font-weight: bold; }
        .movie-item:hover { background: #e50914; }
        iframe, video { width: 100%; height: 100%; border: none; }
        h2 { padding: 15px; color: #e50914; text-align: center; font-size: 16px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>PLAYLIST</h2>
    <div id="playlist">Loading...</div>
</div>

<div id="main-content" id="player-container">
    <div id="video-placeholder" style="display:flex; justify-content:center; align-items:center; height:100%; color:#555;">
        Select a movie to start
    </div>
</div>

<script>
    const m3uUrl = 'https://alraisim949-eng.github.io/anymovie-Premium-tv/list.m3u';

    async function loadPlaylist() {
        try {
            const response = await fetch(m3uUrl);
            const data = await response.text();
            const lines = data.split('\n');
            const playlistElement = document.getElementById('playlist');
            playlistElement.innerHTML = '';

            let currentTitle = '';
            lines.forEach((line) => {
                line = line.trim();
                if (line.startsWith('#EXTINF')) {
                    currentTitle = line.split(',')[1] || 'Movie';
                } else if (line.startsWith('http')) {
                    const btn = document.createElement('div');
                    btn.className = 'movie-item';
                    btn.innerText = '▶ ' + currentTitle;
                    const url = line;
                    btn.onclick = () => {
                        const container = document.getElementById('main-content');
                        // نستخدم وسم video المباشر لأنه الأقوى للأندرويد
                        container.innerHTML = `<video controls autoplay><source src="${url}" type="video/mp4"></video>`;
                    };
                    playlistElement.appendChild(btn);
                }
            });
        } catch (e) {
            document.getElementById('playlist').innerText = 'Error';
        }
    }
    loadPlaylist();
</script>
</body>
</html>
