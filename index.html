<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANYMOVIE PREMIUM</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; background-color: black; }
        .video-js { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <video id="anymovie-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto">
    </video>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        var player = videojs('anymovie-player');
        // هذا السطر يربط المشغل بملف الأفلام الخاص بك
        const m3uUrl = 'https://raw.githubusercontent.com/alraisim949-eng/anymovie-Premium-tv/main/list.m3u';

        fetch(m3uUrl)
            .then(response => response.text())
            .then(data => {
                const lines = data.split('\n');
                const movieLink = lines.find(line => line.trim().startsWith('http'));
                if (movieLink) {
                    player.src({ src: movieLink.trim(), type: 'video/mp4' });
                    player.play();
                }
            });
    </script>
</body>
</html>
